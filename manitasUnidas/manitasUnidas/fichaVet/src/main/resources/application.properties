spring.application.name=ms-fichaVet
server.port=8086

# Conexión a MySQL (asegúrate de que el nombre sea db_fichavet)
spring.datasource.url=jdbc:mysql://localhost:3307/db_fichavet?createDatabaseIfNotExist=true&serverTimezone=UTC
# Deja el password vacío si es XAMPP por defecto
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Desactivar Eureka temporalmente (para que no te dé errores de conexión si no tienes el servidor Eureka corriendo)
logging.level.manitasUnidas.fichaVet.client=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html