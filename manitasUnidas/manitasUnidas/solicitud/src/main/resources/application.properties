spring.application.name=ms-solicitud
server.port=8085

# Conexión a Base de Datos (Puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/db_solicitudes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Parche estricto para Hibernate 6.6 / MySQL antiguo
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Configuración de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Configuración de Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html