spring.application.name=ms-solicitud-test
server.port=8085

# Forzar base de datos H2 en memoria para el test
spring.datasource.url=jdbc:h2:mem:solicitud_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialecto Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Desconectar servicios de la nube durante la prueba
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false   