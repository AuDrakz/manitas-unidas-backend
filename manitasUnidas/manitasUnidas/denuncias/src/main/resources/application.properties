# Nombre del microservicio (así aparecerá en Eureka)
spring.application.name=ms-denuncias

# Puerto único para evitar conflictos
server.port=8088

# Configuración de la Base de Datos
# Agregué 'createDatabaseIfNotExist=true' para que no tengas que crearla a mano en MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/db_denuncias?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Conexión con Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

springdoc.packages-to-scan=manitasUnidas.denuncias.controller