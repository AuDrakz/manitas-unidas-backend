# Motor H2 en memoria exclusivo para aislar las pruebas de MySQL
spring.datasource.url=jdbc:h2:mem:mascotas_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Propiedades de Hibernate para pruebas rápidas
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desactivar Eureka y descubrir servicios en el entorno de pruebas
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false