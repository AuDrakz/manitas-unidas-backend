# 1. Identidad del Microservicio
spring.application.name=ms-mascotas

# 2. Puerto de ejecución
server.port=8082

# 3. Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/db_mascotas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 5. Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true

# 6. Feign / Logging
logging.level.manitasUnidas.mascotas.client=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG

# 7. OpenAPI / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html