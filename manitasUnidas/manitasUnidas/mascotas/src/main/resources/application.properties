# 1. Identidad del Microservicio
spring.application.name=mascotas

# 2. Puerto de ejecucion
server.port=8082

#3. Configuracion de Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/db_mascotas?createDatabaseIfNotExist=true&
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuracion de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
# 5. Registro en el Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 6. Configuracion de Feign
logging.level.manitasUnidas.mascotas.client=DEBUG