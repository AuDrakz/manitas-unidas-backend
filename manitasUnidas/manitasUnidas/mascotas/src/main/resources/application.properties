# 1. Identidad del Microservicio
spring.application.name=ms-mascotas

# 2. Puerto de ejecución
# Usamos el 8082 para Mascotas (equivalente a Pedidos en el ejemplo del profe)
server.port=8082

# 3. Configuración de Base de Datos MySQL (db_mascotas)
spring.datasource.url=jdbc:mysql://localhost:3307/db_mascotas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 5. Registro en el Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Requisito de equipo para monitoreo de salud
eureka.client.healthcheck.enabled=true

# 6. Configuración de Feign / Logs
logging.level.manitasUnidas.mascotas.client=DEBUG

# 7.- Dependencias Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html