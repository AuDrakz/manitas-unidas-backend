spring.application.name=ms-notificaciones
server.port=8084

# Base de Datos (Asegúrate de crear 'notificaciones_db' en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/notificaciones_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Configuración de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuración de Correo (Ejemplo para Gmail)
# Necesitarás una "Contraseña de Aplicación" de Google, no tu clave normal
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_token_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true