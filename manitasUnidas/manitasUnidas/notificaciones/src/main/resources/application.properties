spring.application.name=ms-notificaciones
server.port=8084

# Base de Datos (Asegúrate de crear 'notificaciones_db' en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3307/db_notificaciones?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Configuración de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuración de Correo (Ejemplo para Gmail)
# Necesitarás una "Contraseña de Aplicación" de Google, no tu clave normal
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_token_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

springdoc.packages-to-scan=manitasUnidas.notificaciones.controller
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true