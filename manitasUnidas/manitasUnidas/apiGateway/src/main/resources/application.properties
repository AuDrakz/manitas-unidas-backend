
spring.application.name=api-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Ruta 0: Usuarios
spring.cloud.gateway.routes[0].id=ms-usuarios
spring.cloud.gateway.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/usuarios/**

# Ruta 1: FichaVet
spring.cloud.gateway.routes[1].id=ms-fichavet
spring.cloud.gateway.routes[1].uri=lb://ms-fichavet
spring.cloud.gateway.routes[1].predicates[0]=Path=/fichas/**

# Ruta 2: Refugios
spring.cloud.gateway.routes[2].id=ms-refugios
spring.cloud.gateway.routes[2].uri=lb://ms-refugios
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/refugios/**

# Ruta 3: Mascotas
spring.cloud.gateway.routes[3].id=ms-mascotas
spring.cloud.gateway.routes[3].uri=lb://ms-mascotas
spring.cloud.gateway.routes[3].predicates[0]=Path=/mascotas/**