# ==========================================
# 1. Identidad del Microservicio
# ==========================================
spring.application.name=ms-blacklist

# ==========================================
# 2. Puerto de ejecución
# ==========================================
server.port=8089

# ==========================================
# 3. Configuración de Base de Datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3307/db_blacklist?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 4. Configuración de JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Corregido: Se usa el dialecto moderno para MySQL 8 o simplemente se deja que Spring lo autodetecte
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# 5. Registro en el Servidor Eureka
# ==========================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true
eureka.instance.appname=ms-blacklist

# ==========================================
# 6. Configuración de Swagger / OpenAPI (Evita Error 500)
# ==========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Fuerza a Swagger a escanear solo tu paquete respetando las mayúsculas actuales
springdoc.packages-to-scan=manitasUnidas.blackList.Controller