# 1. Identificación del Microservicio
spring.application.name=ms-refugios
server.port=8082

# 2. Configuración de la Base de Datos (Crea la DB 'refugios_db' en MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/refugios_db?createDatabaseIfNotExist=true
spring.datasource.username=tu_usuario
spring.datasource.password=tu_contraseña
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Configuración para Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# 5. Formato JSON (Opcional, para que las fechas se vean bien si luego agregas)
spring.jackson.serialization.indent_output=true