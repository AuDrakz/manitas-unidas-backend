# =====================================================
# IDENTIFICACIÓN DEL MICROSERVICIO
# =====================================================
spring.application.name=ms-refugios
server.port=8083

# =====================================================
# BASE DE DATOS MYSQL
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3307/db_refugios?createDatabaseIfNotExist=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Santiago

# Descomentar solo para depuración avanzada
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =====================================================
# EUREKA CLIENT
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =====================================================
# JACKSON
# =====================================================
spring.jackson.serialization.indent_output=true

# =====================================================
# SWAGGER / OPENAPI
# =====================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.packages-to-scan=manitasUnidas.refugios.controller

# =====================================================
# LOGGING
# =====================================================
logging.level.root=INFO
logging.level.manitasUnidas.refugios=INFO