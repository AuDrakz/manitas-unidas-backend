spring.application.name=seguridad
# Puerto del servicio (diferente a los otros para que no choquen)
server.port=8080

# Configuración de la Base de Datos (ajustada a tu puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/db_usuarios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate para que cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Registro en el Eureka de tu compañera
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

springdoc.packages-to-scan=manitasUnidas.seguridad.Controller