# 1. Identidad del Microservicio
spring.application.name=ms-usuarios

# 2. Puerto de ejecución
# Usamos el 8081 para Usuarios (equivalente a Stock en el ejemplo del profe)
server.port=8081

# 3. Configuración de Base de Datos MySQL (db_usuarios)
spring.datasource.url=jdbc:mysql://localhost:3307/db_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 5. Registro en el Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Requisito de equipo para monitoreo de salud
eureka.client.healthcheck.enabled=true

# 6. Configuración de Feign / Logs
logging.level.manitasUnidas.usuarios.client=DEBUG